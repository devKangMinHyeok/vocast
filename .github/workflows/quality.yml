name: Quality Gate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 0"  # 매주 월요일 오전 5시 (KST)

jobs:
  quality:
    # GitHub 호스티드 맥 러너는 Metal 커널 컴파일이 안 돼 TTS 생성이 불가능하다
    # (실측: implicit_gemm_conv_2d 커널 로드 실패). 그래서 여기서는 로컬에서
    # 생성해 커밋한 "골든 샘플"을 채점하는 게이트만 돌린다 — 평가 스택 회귀 감지.
    # 실제 생성 게이트는 로컬(GPU 있는 맥)에서: python3 quality/run_eval.py --fast
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ffmpeg
        run: brew install ffmpeg
      - name: Cache HF + torch.hub models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: hf-models-${{ runner.os }}-v2
      - name: Install deps
        run: |
          pip install -r requirements.txt -r voice/requirements-voice.txt
          pip install resemblyzer jiwer onnxruntime librosa "setuptools<81" pytest
      - name: Unit tests
        run: pytest tests -q
      - name: Quality eval (score golden samples → gate)
        run: python3 quality/run_eval.py --golden --report quality-report.json
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.json
