name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      # 전체 의존성(mlx·torch)은 Apple Silicon 전용이라 ubuntu에서 설치 불가.
      # 유닛 테스트는 heavy 모듈을 importorskip으로 건너뛰므로 경량 셋만 설치.
      # 전용 venv에 설치하고 --no-project로 실행 (프로젝트 sync가 mlx를 끌지 않게).
      # setup-uv가 python-version 지정 시 .venv를 이미 생성함 → 거기에 설치.
      - name: Install light test deps
        run: uv pip install flask pytest numpy
      - name: Unit tests
        run: uv run --no-project pytest tests -q

  # 크로스플랫폼 검증: Windows에서 잠긴 의존성이 실제로 풀리는지
  # (mlx는 플랫폼 마커로 조건부 → Windows에선 자동 제외되어야 함).
  # 앱이 mlx 없이 import되고 축소 기능만 활성인지 확인.
  windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync locked deps (mlx must be skipped on Windows)
        run: uv sync --frozen
      - name: App imports & degrades gracefully (no mlx)
        run: |
          uv run --frozen python -c "from core.clone import clone_available; from web.server import app; assert clone_available() is False, 'mlx must be absent on Windows'; print('Windows clone disabled, app OK')"
      - name: Unit tests
        run: uv run --frozen pytest tests -q
